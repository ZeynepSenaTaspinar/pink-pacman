<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Pink Pac-Man</title>
  <style>
    body {
      margin: 0;
      background: #ffd6e8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    canvas {
      background: #fff0f6;
      border: 6px solid #ff69b4;
      border-radius: 18px;
      box-shadow: 0 0 30px #ff8ac7;
    }

    #score {
      position: absolute;
      top: 25px;
      font-size: 28px;
      color: #d63384;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="game" width="420" height="420"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    const size = 30;
    const rows = 14;
    const cols = 14;

    let score = 0;

    const map = [
      "11111111111111",
      "10000010000001",
      "10111010111001",
      "10000000000001",
      "10101111101001",
      "10001000001001",
      "11101011101011",
      "10000010000001",
      "10111010111001",
      "10000000000001",
      "10101111101001",
      "10001000001001",
      "10000000000001",
      "11111111111111"
    ];

    let pellets = map.map(row => row.split("").map(cell => cell === "0"));

    const pacman = {
      x: 1,
      y: 1,
      dx: 0,
      dy: 0
    };

    const ghost = {
      x: 12,
      y: 12
    };

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowUp") {
        pacman.dx = 0;
        pacman.dy = -1;
      } else if (e.key === "ArrowDown") {
        pacman.dx = 0;
        pacman.dy = 1;
      } else if (e.key === "ArrowLeft") {
        pacman.dx = -1;
        pacman.dy = 0;
      } else if (e.key === "ArrowRight") {
        pacman.dx = 1;
        pacman.dy = 0;
      }
    });

    function isWall(x, y) {
      return map[y][x] === "1";
    }

    function movePacman() {
      const nextX = pacman.x + pacman.dx;
      const nextY = pacman.y + pacman.dy;

      if (!isWall(nextX, nextY)) {
        pacman.x = nextX;
        pacman.y = nextY;
      }

      if (pellets[pacman.y][pacman.x]) {
        pellets[pacman.y][pacman.x] = false;
        score += 10;
        scoreEl.textContent = "Score: " + score;
      }
    }

    function moveGhost() {
      const directions = [
        { dx: 1, dy: 0 },
        { dx: -1, dy: 0 },
        { dx: 0, dy: 1 },
        { dx: 0, dy: -1 }
      ];

      const possible = directions.filter(dir => {
        const nx = ghost.x + dir.dx;
        const ny = ghost.y + dir.dy;
        return !isWall(nx, ny);
      });

      const choice = possible[Math.floor(Math.random() * possible.length)];
      ghost.x += choice.dx;
      ghost.y += choice.dy;
    }

    function checkCollision() {
      if (pacman.x === ghost.x && pacman.y === ghost.y) {
        alert("Game Over 💔 Score: " + score);
        location.reload();
      }
    }

    function drawMap() {
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          if (map[y][x] === "1") {
            ctx.fillStyle = "#ff69b4";
            ctx.fillRect(x * size, y * size, size, size);
          } else {
            ctx.fillStyle = "#fff0f6";
            ctx.fillRect(x * size, y * size, size, size);

            if (pellets[y][x]) {
              ctx.fillStyle = "#ffb3d9";
              ctx.beginPath();
              ctx.arc(
                x * size + size / 2,
                y * size + size / 2,
                4,
                0,
                Math.PI * 2
              );
              ctx.fill();
            }
          }
        }
      }
    }

    function drawPacman() {
      ctx.fillStyle = "#ff1493";
      ctx.beginPath();
      ctx.arc(
        pacman.x * size + size / 2,
        pacman.y * size + size / 2,
        12,
        0.25 * Math.PI,
        1.75 * Math.PI
      );
      ctx.lineTo(pacman.x * size + size / 2, pacman.y * size + size / 2);
      ctx.fill();
    }

    function drawGhost() {
      ctx.fillStyle = "#c9184a";
      ctx.beginPath();
      ctx.arc(
        ghost.x * size + size / 2,
        ghost.y * size + size / 2,
        12,
        Math.PI,
        0
      );
      ctx.lineTo(ghost.x * size + 27, ghost.y * size + 27);
      ctx.lineTo(ghost.x * size + 21, ghost.y * size + 22);
      ctx.lineTo(ghost.x * size + 15, ghost.y * size + 27);
      ctx.lineTo(ghost.x * size + 9, ghost.y * size + 22);
      ctx.lineTo(ghost.x * size + 3, ghost.y * size + 27);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "white";
      ctx.beginPath();
      ctx.arc(ghost.x * size + 11, ghost.y * size + 14, 3, 0, Math.PI * 2);
      ctx.arc(ghost.x * size + 20, ghost.y * size + 14, 3, 0, Math.PI * 2);
      ctx.fill();
    }

    function checkWin() {
      const remaining = pellets.flat().some(p => p);
      if (!remaining) {
        alert("Kazandınnn 💖 Score: " + score);
        location.reload();
      }
    }

    function gameLoop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      movePacman();
      moveGhost();
      checkCollision();
      checkWin();

      drawMap();
      drawPacman();
      drawGhost();
    }

    setInterval(gameLoop, 250);
  </script>
</body>
</html>
